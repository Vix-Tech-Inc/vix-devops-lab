# VIX Technologies — Prometheus Configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    company: 'vix-technologies'
    environment: 'production'

# Alerting
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Rules
rule_files:
  - 'alerts/*.yml'

# Scrape configs
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # VIX Platform (Next.js)
  - job_name: 'vix-platform'
    static_configs:
      - targets: ['vix-platform:3000']
    metrics_path: '/api/metrics'
    scrape_interval: 30s

  # Node Exporter (System metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # NGINX
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113']

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']