version: '3.8'

# VIX Technologies — Monitoring Stack
# Prometheus + Grafana + AlertManager + Loki

services:
  # ─── Prometheus (Metrics Collection) ────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: vix-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - monitoring

  # ─── Grafana (Visualization) ─────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: vix-grafana
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-vixtech2026}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=monitoring.vixtech.co.ke
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_FROM_ADDRESS=alerts@vixtech.co.ke
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - monitoring
    depends_on:
      - prometheus

  # ─── AlertManager ─────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: vix-alertmanager
    restart: unless-stopped
    ports:
      - '9093:9093'
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - monitoring

  # ─── Node Exporter (System Metrics) ──────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: vix-node-exporter
    restart: unless-stopped
    ports:
      - '9100:9100'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring

  # ─── Loki (Log Aggregation) ───────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: vix-loki
    restart: unless-stopped
    ports:
      - '3100:3100'
    volumes:
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring

  # ─── Promtail (Log Shipper) ───────────────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: vix-promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring
    depends_on:
      - loki

# ─── Networks ─────────────────────────────────────────────────
networks:
  monitoring:
    driver: bridge
    name: vix-monitoring

# ─── Volumes ──────────────────────────────────────────────────
volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local