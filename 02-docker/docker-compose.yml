version: '3.8'

services:
  # ─── VIX Platform (Next.js) ─────────────────────────────────
  vix-platform:
    build:
      context: ..
      dockerfile: 02-docker/Dockerfile
      target: runner
    container_name: vix-platform
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    env_file:
      - .env.production
    networks:
      - vix-network
    depends_on:
      - nginx
    labels:
      - 'traefik.enable=true'
      - 'com.vixtech.service=platform'
      - 'com.vixtech.version=1.0.0'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── NGINX Reverse Proxy ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: vix-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    networks:
      - vix-network
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:80']
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Redis Cache ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vix-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - vix-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

# ─── Networks ─────────────────────────────────────────────────
networks:
  vix-network:
    driver: bridge
    name: vix-network

# ─── Volumes ──────────────────────────────────────────────────
volumes:
  redis-data:
    driver: local
  nginx-logs:
    driver: local